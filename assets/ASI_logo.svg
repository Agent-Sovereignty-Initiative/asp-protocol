<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F6FFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7EC8FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0F6FFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Subtle outer ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#1e3a6e" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#1e3a6e" stroke-width="0.5" opacity="0.4"/>

  <!-- Shield shape - main body -->
  <!-- Shield path: top flat, sides angled in, bottom point -->
  <path d="M200 68
             L292 102
             L292 196
             C292 248 252 284 200 308
             C148 284 108 248 108 196
             L108 102
             Z"
        fill="none"
        stroke="url(#shieldGrad)"
        stroke-width="3"
        filter="url(#glow)"
        opacity="0.9"/>

  <!-- Shield inner subtle fill -->
  <path d="M200 68
             L292 102
             L292 196
             C292 248 252 284 200 308
             C148 284 108 248 108 196
             L108 102
             Z"
        fill="#0F3460"
        opacity="0.18"/>

  <!-- Top glow line on shield -->
  <path d="M200 68 L292 102 L108 102 Z"
        fill="url(#glowGrad)"
        opacity="0.3"/>

  <!-- Network nodes - 6 dots arranged inside shield, suggesting agents -->
  <!-- Center node -->
  <circle cx="200" cy="192" r="7" fill="#4A9EFF" filter="url(#glow)" opacity="0.95"/>

  <!-- Surrounding nodes -->
  <circle cx="200" cy="142" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>
  <circle cx="241" cy="167" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>
  <circle cx="241" cy="217" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>
  <circle cx="200" cy="242" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>
  <circle cx="159" cy="217" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>
  <circle cx="159" cy="167" r="4.5" fill="#7EC8FF" filter="url(#glow)" opacity="0.8"/>

  <!-- Connection lines from center to outer nodes -->
  <line x1="200" y1="192" x2="200" y2="142" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="192" x2="241" y2="167" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="192" x2="241" y2="217" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="192" x2="200" y2="242" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="192" x2="159" y2="217" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="192" x2="159" y2="167" stroke="#4A9EFF" stroke-width="1.2" opacity="0.45"/>

  <!-- Outer ring connections between nodes -->
  <polygon points="200,142 241,167 241,217 200,242 159,217 159,167"
           fill="none" stroke="#4A9EFF" stroke-width="0.8" opacity="0.25"/>

  <!-- Small key icon hint at shield tip - lock shape -->
  <rect x="189" y="272" width="22" height="16" rx="3" ry="3"
        fill="none" stroke="#4A9EFF" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <path d="M194 272 L194 267 C194 262 206 262 206 267 L206 272"
        fill="none" stroke="#4A9EFF" stroke-width="1.8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="200" cy="280" r="2.5" fill="#4A9EFF" opacity="0.85"/>

  <!-- ASI text below -->
  <text x="200" y="348"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="10"
        text-anchor="middle"
        fill="#4A9EFF"
        filter="url(#glow)"
        opacity="0.95">ASI</text>

  <!-- Tagline -->
  <text x="200" y="368"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="#7EC8FF"
        opacity="0.55">AGENT SOVEREIGNTY</text>

</svg>
